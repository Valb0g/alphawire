services:
  - type: worker
    name: alphawire
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/orchestrator/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CRYPTOPANIC_TOKEN
        sync: false
      - key: RELEVANCE_THRESHOLD
        value: "6"
      - key: RSS_INTERVAL_MINUTES
        value: "10"
      - key: API_INTERVAL_MINUTES
        value: "10"
      - key: TELEGRAM_INTERVAL_MINUTES
        value: "10"
      - key: OPENROUTER_MODEL
        value: minimax/minimax-m2.5:free
